<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descubra Seu Temperamento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#F6F1EB;
    --card:#FFFDF9;
    --primary:#8A6448;
    --primary-dark:#5F4331;
    --text:#2F2A27;
    --muted:#7A6F68;
    --border:#E7DDD4;
    --analyst:#ECE6DF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
}

.hidden{
    display:none;
}

/* ===================
CAPA
=================== */

#cover{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
    text-align:center;
}

.cover-image{
    width:100%;
    max-width:420px;
    border-radius:24px;
    overflow:hidden;
    margin-bottom:30px;
}

.cover-image img{
    width:100%;
    display:block;
}

.cover-title{
    font-family:'Cormorant Garamond',serif;
    font-size:42px;
    line-height:1.1;
    margin-bottom:20px;
}

.cover-subtitle{
    color:var(--muted);
    font-size:16px;
    line-height:1.7;
    max-width:500px;
    margin-bottom:35px;
}

.main-btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:18px 34px;
    border-radius:999px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.main-btn:hover{
    background:var(--primary-dark);
}

/* ===================
CHAT
=================== */

#chatContainer{
    max-width:900px;
    margin:auto;
    padding:25px;
}

#chat{
    display:flex;
    flex-direction:column;
    gap:20px;
    padding-bottom:350px;
}

/* ===================
BOLHAS
=================== */

.message-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    
}

.avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    object-fit:cover;
    object-position:center 15%;
}

.message-text{
    line-height:1.7;
}

.message{
    max-width:80%;
    padding:18px;
    border-radius:24px;
    line-height:1.7;
    animation:fadeIn .4s ease;
}

.vanessa{
    background:var(--card);
    border:1px solid var(--border);
    align-self:flex-start;
}

.user{
    background:var(--primary);
    color:white;
    align-self:flex-end;
}

.analyst{
    background:var(--analyst);
    align-self:center;
    text-align:center;
    max-width:90%;
}

.author{
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    color:var(--primary);
    text-align:center;
}

/* ===================
RESPOSTAS
=================== */

#answers{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:var(--bg);
    padding:20px;
    border-top:1px solid var(--border);

    display:flex;
    flex-direction:column;
    gap:10px;
}

.answer-btn{
    background:white;
    border:1px solid var(--border);
    padding:16px;
    border-radius:18px;
    text-align:left;
    cursor:pointer;
    transition:.3s;
    font-size:20px;
}

.answer-btn:hover{
    border-color:var(--primary);
    transform:translateY(-2px);
}

/* ===================
RESULTADO
=================== */

#resultContainer{
    max-width:800px;
    margin:auto;
    padding:40px 25px 80px;
}

.result-card{
    background:white;
    border-radius:24px;
    padding:35px;
    border:1px solid var(--border);
}

.result-label{
    color:var(--muted);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:15px;
}

.result-title{
    font-family:'Cormorant Garamond',serif;
    font-size:48px;
    color:#8A6448;
    line-height:1;
    word-break:break-word;
}

@media (max-width:768px){

    .result-title{
        font-size:30px;
        line-height:1.1;
    }

}

.result-text{
    line-height:1.9;
    font-size:17px;
}

/* ===================
ANIMAÇÃO
=================== */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- CAPA -->

<section id="cover">

    <div class="cover-image">
        <img src="capa.jpg" alt="Temperamentos">
    </div>

    <button class="main-btn" id="startBtn"> Iniciar Experiência </button>

</section>

<!-- CHAT -->

<section id="chatContainer" class="hidden">

    <div id="chat">

    </div>

</section>

<!-- RESULTADO -->

<section id="resultContainer" class="hidden">

    <div class="result-card">

        <div class="result-label">
            Sua tendência predominante
        </div>

        <h2 class="result-title" id="resultTitle">
            MELANCÓLICO | TERRA
        </h2>

        <div class="result-text" id="resultText">

        </div>

        <br><br>

       <a
href="https://wa.me/5511947945414?text=Ola!%20Acabei%20de%20fazer%20o%20teste%20de%20temperamento%20e%20gostaria%20de%20saber%20mais."
target="_blank"
class="main-btn"
style="display:inline-block;text-decoration:none;"
>
Quero Dar o Próximo Passo
</a>

<br><br>

<a
href="https://www.instagram.com/vanessagama.12/"
target="_blank"
class="main-btn"
style="display:inline-block;text-decoration:none;background:#fff;color:#8A6448;border:1px solid #8A6448;"
>
Seguir no Instagram
</a>

<br><br>

<button
class="main-btn"
onclick="location.reload();"
style="background:#D8CEC4;color:#5F4331;"
>
Refazer Teste
</button>

    </div>

</section>

<div id="answers" class="hidden"></div>

<script>

const questions = [

{
question:"Algumas situações passam rápido. Outras ficam ecoando dentro da gente por muito tempo. Qual delas costuma permanecer com você?",
answers:[
"Uma crítica que recebi.",
"Quando colocam em dúvida minhas decisões ou capacidades.",
"Um erro que cometi e gostaria de ter evitado.",
"Um conflito envolvendo pessoas que amo."
]
},

{
question:"Quando você sente que não foi compreendida, o que acontece dentro de você?",
answers:[
"Sinto vontade de explicar melhor o que realmente quis dizer.",
"Fico frustrada por não terem entendido meu ponto.",
"Repasso toda a situação várias vezes na minha mente.",
"Prefiro deixar o assunto para evitar desgaste."
]
},

{
question:"Nem tudo acontece como planejamos. Quando algo importante dá errado, qual pensamento costuma aparecer primeiro?",
answers:[
"Talvez algo bom ainda possa surgir disso.",
"O que eu posso fazer para mudar essa situação?",
"Onde foi que eu falhei?",
"Talvez eu só precise dar tempo ao tempo."
]
},

{
question:"Você está convivendo com alguém há algum tempo. Em qual situação essa convivência começaria a te desgastar?",
answers:[
"Quando a pessoa parece distante ou sem entusiasmo.",
"Quando evita decisões e nunca toma iniciativa.",
"Quando não cumpre o que promete.",
"Quando cria conflitos desnecessários."
]
},

{
question:"Tem dias em que a vida pesa mais do que o normal. Nesses momentos, o que mais se parece com você?",
answers:[
"Procuro alguém para conversar e colocar para fora o que estou sentindo.",
"Tento resolver o problema antes que ele cresça.",
"Preciso de um tempo para entender tudo o que está acontecendo dentro de mim.",
"Carrego tudo em silêncio até sentir que é a hora de falar."
]
},

{
question:"Qual destas situações aquece mais o seu coração?",
answers:[
"Perceber que fui lembrada e querida pelas pessoas.",
"Sentir que meu esforço realmente fez diferença.",
"Saber que confiaram em mim para algo importante.",
"Ver que pude trazer paz ou conforto para alguém."
]
},

{
question:"Imagine que você chega sozinha a um lugar onde não conhece ninguém. O que acontece naturalmente?",
answers:[
"Logo começo a puxar conversa e criar conexões.",
"Tento entender quem está conduzindo o ambiente.",
"Observo primeiro, depois me aproximo.",
"Vou me adaptando aos poucos, no meu tempo."
]
},

{
question:"Você recebe uma oportunidade inesperada que pode mudar os próximos meses da sua vida. O que acontece primeiro?",
answers:[
"Começo a imaginar tudo o que posso viver e experimentar.",
"Penso em como transformar essa oportunidade em algo concreto.",
"Preciso entender todos os detalhes antes de decidir.",
"Quero avaliar com calma como essa mudança afetará minha vida e as pessoas ao meu redor."
]
},

{
question:"Algumas decepções passam. Outras deixam marcas mais profundas. Qual delas costuma ser mais difícil para você?",
answers:[
"Quando alguém se afasta sem explicação.",
"Quando meu esforço não é reconhecido.",
"Quando percebo que não correspondi às minhas próprias expectativas.",
"Quando vejo relacionamentos importantes se desgastando."
]
},

{
question:"Você termina um dia cansativo, mas com o coração leve. O que provavelmente aconteceu?",
answers:[
"Compartilhei momentos especiais com pessoas que gosto.",
"Alcancei um objetivo que era importante para mim.",
"Fiz algo da melhor forma que consegui.",
"Vivi um dia tranquilo, sem conflitos ou tensões."
]
},

{
question:"Todo mundo tem uma forma de recuperar as energias depois de períodos difíceis. O que mais funciona para você?",
answers:[
"Estar perto de pessoas que me fazem bem.",
"Sentir que estou avançando em algo importante.",
"Ter tempo para mim e para os meus pensamentos.",
"Encontrar paz, silêncio e tranquilidade."
]
},

{
question:"Se você pudesse eliminar uma única sensação da sua vida para sempre, qual escolheria?",
answers:[
"Sentir que fui esquecida.",
"Sentir que não fui respeitada.",
"Sentir que não fui boa o suficiente.",
"Sentir que existe conflito entre pessoas importantes para mim."
]
}

];

let currentQuestion = 0;

let scores = {
sanguineo:0,
colerico:0,
melancolico:0,
fleumatico:0
};

function addVanessaMessage(text){

    const chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="message vanessa">

        <div class="message-header">

            <img src="imgvanessa.jpg" class="avatar" alt="Vanessa">

            <div class="author">
                Vanessa
            </div>

        </div>

        <div class="message-text">
            ${text}
        </div>

    </div>
    `;

    window.scrollTo(0, document.body.scrollHeight);
}

function addUserMessage(text){

    const chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="message user">
        ${text}
    </div>
    `;

    window.scrollTo(
        0,
        document.body.scrollHeight
    );
}

function addAnalystMessage(text){

    const chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="message analyst">

        <div class="message-header" style="justify-content:center;">

            <img src="imgvanessa.jpg" class="avatar" alt="Vanessa">

        </div>

        <div class="author" style="text-align:center;">
            Vanessa
        </div>

        <div class="message-text">
            ${text}
        </div>

    </div>
    `;

    window.scrollTo(
        0,
        document.body.scrollHeight
    );
}

function startExperience(){

addVanessaMessage(`
Antes de começarmos...

Quero te fazer algumas perguntas.

Não existem respostas certas ou erradas.

Apenas escolha aquilo que mais se aproxima da sua experiência.
`);

setTimeout(()=>{
renderQuestion();
},1000);

}

function renderQuestion(){

const q = questions[currentQuestion];

addVanessaMessage(q.question);

const answersDiv =
document.getElementById("answers");

answersDiv.innerHTML = "";

q.answers.forEach((answer,index)=>{

const btn =
document.createElement("button");

btn.className = "answer-btn";

btn.innerText = answer;

btn.onclick = ()=>selectAnswer(index,answer);

answersDiv.appendChild(btn);

});

}

function selectAnswer(index,text){

addUserMessage(text);

if(index === 0) scores.sanguineo++;
if(index === 1) scores.colerico++;
if(index === 2) scores.melancolico++;
if(index === 3) scores.fleumatico++;

currentQuestion++;

document.getElementById("answers").innerHTML = "";

if(currentQuestion === 4){

setTimeout(()=>{
addAnalystMessage(`
Interessante...

Já consigo perceber alguns padrões emocionais.
`);
},500);

}

if(currentQuestion === 8){

setTimeout(()=>{
addAnalystMessage(`Sua forma de lidar com pessoas e decisões está ficando mais clara.`);
},500);

}

if(currentQuestion >= questions.length){

setTimeout(()=>{
showResult();
},1000);

return;

}

setTimeout(()=>{
renderQuestion();
},800);

}

function showResult(){

document
.getElementById("chatContainer")
.classList.add("hidden");

document
.getElementById("answers")
.classList.add("hidden");

document
.getElementById("resultContainer")
.classList.remove("hidden");

setTimeout(() => {

    document
    .getElementById("resultContainer")
    .scrollIntoView({
        behavior:"smooth",
        block:"start"
    });

}, 100);

const highest =
Object.entries(scores)
.sort((a,b)=>b[1]-a[1])[0][0];

const results = {

sanguineo: {
title:"SANGUÍNEO | AR",
text:`

Você é alguém que vive a vida através das conexões.

As pessoas, as experiências e os momentos têm um peso especial para você. Seu coração costuma encontrar beleza nas relações, nas conversas e nos encontros que acontecem ao longo do caminho. Existe uma leveza natural em sua forma de enxergar a vida, e muitas vezes sua presença ilumina ambientes sem que você perceba.

Você sente intensamente o momento presente. Quando está feliz, contagia. Quando sonha, inspira. Quando acredita em algo, envolve as pessoas ao seu redor com facilidade.

Ao mesmo tempo, sua sensibilidade pode fazer com que críticas, rejeições ou a sensação de não ser lembrada mexam mais com você do que costuma demonstrar. Em alguns momentos, o entusiasmo pode chegar antes da reflexão, fazendo com que você comece projetos com facilidade, mas encontre dificuldade para manter o mesmo ritmo até o final.

Seu maior presente é a capacidade de gerar vida, conexão e esperança nos ambientes por onde passa.

Seu desafio está em desenvolver constância sem perder a espontaneidade que torna você única.

`
},

colerico: {
title:"COLÉRICO | FOGO",
text:`

Você é alguém que naturalmente enxerga possibilidades de ação onde outras pessoas enxergam obstáculos.

Existe dentro de você uma força que a impulsiona a avançar, decidir e transformar situações. Enquanto muitas pessoas ficam presas às dúvidas, você costuma procurar caminhos. Seu olhar está voltado para soluções, crescimento e realização.

Você valoriza competência, responsabilidade e propósito. Quando acredita em algo, tende a se dedicar profundamente para fazer acontecer.

Por trás dessa força, porém, existe uma sensibilidade que poucas pessoas enxergam. Questionamentos sobre sua capacidade, injustiças ou a sensação de não ser reconhecida podem gerar mais impacto do que aparentam.

Seu impulso natural para resolver problemas também pode fazer com que carregue responsabilidades demais ou tenha dificuldade em desacelerar.

Seu maior presente é a coragem para agir quando outros hesitam.

Seu desafio está em lembrar que nem tudo precisa ser resolvido imediatamente e que vulnerabilidade também é uma forma de força.

`
},

melancolico: {
title:"MELANCÓLICO | TERRA",
text:`

Você é alguém que percebe profundidade onde muitas pessoas enxergam apenas a superfície.

Sua forma de sentir e interpretar a vida costuma ser intensa, reflexiva e significativa. Você não se conecta apenas com o que acontece. Você busca compreender os motivos, os detalhes e os significados por trás das situações.

Existe uma riqueza interior muito grande dentro de você. Sua capacidade de observação, sensibilidade e análise permite enxergar nuances que passam despercebidas para a maioria das pessoas.

Por outro lado, essa mesma profundidade pode fazer com que erros, críticas ou decepções permaneçam por mais tempo em sua mente. Você tende a refletir muito sobre as situações e, às vezes, acaba sendo mais exigente consigo mesma do que seria com qualquer outra pessoa.

Seu maior presente é a capacidade de trazer profundidade, excelência e significado para tudo aquilo que faz.

Seu desafio está em oferecer a si mesma a mesma compreensão e gentileza que oferece aos outros.

`
},

fleumatico: {
title:"FLEUMÁTICO | ÁGUA",
text:`

Você é alguém que encontra força na serenidade.

Enquanto muitas pessoas reagem impulsivamente às situações, você costuma observar, ponderar e buscar equilíbrio. Sua presença transmite segurança, acolhimento e estabilidade, fazendo com que as pessoas se sintam confortáveis ao seu lado.

Você valoriza relações harmoniosas e ambientes onde existe respeito e tranquilidade. Muitas vezes é a pessoa que escuta, compreende e ajuda a diminuir tensões quando todos ao redor parecem agitados.

Sua sensibilidade para perceber o impacto das situações nos outros é uma das suas maiores qualidades. Porém, justamente por evitar conflitos, você pode acabar guardando sentimentos por mais tempo do que deveria ou adiando conversas importantes.

Seu maior presente é a capacidade de levar paz, equilíbrio e acolhimento para as pessoas ao seu redor.

Seu desafio está em lembrar que expressar suas necessidades e sentimentos também é uma forma de cuidar dos relacionamentos.

`
}

};

document.getElementById("resultTitle").innerText =
results[highest].title;

document.getElementById("resultText").innerHTML =

results[highest].text +

`

<br><br>

<hr style="border:none;border-top:1px solid #ddd;margin:30px 0;">

<p style="line-height:1.9">

O temperamento não determina quem você será.

Ele apenas revela tendências, forças e desafios que acompanham sua caminhada.

Quanto mais consciência você desenvolve sobre si mesma, mais liberdade conquista para crescer além dos seus padrões naturais.

E essa jornada está apenas começando.

</p>

`;

}

document.getElementById("startBtn").addEventListener("click",()=>{

    document
    .getElementById("cover")
    .classList.add("hidden");

    document
    .getElementById("chatContainer")
    .classList.remove("hidden");

    startExperience();

});

</script>

</body>
</html>
